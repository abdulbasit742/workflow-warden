name: security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Scan workflow files for risky patterns
        env:
          PYTHONPATH: src
        run: python -m workflow_warden scan .github/workflows --minimum-severity medium --fail-on medium
      - name: Check for committed secrets in tracked text
        shell: bash
        run: |
          if git grep -nE '(AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|AIza[0-9A-Za-z_-]{35}|BEGIN (RSA|OPENSSH|EC) PRIVATE KEY)' -- . ':!LICENSE'; then
            echo 'Potential secret material detected in tracked files.'
            exit 1
          fi
          echo 'No obvious secret patterns found.'
