name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v
      - name: Smoke scan fixtures
        env:
          PYTHONPATH: src
        run: python -m workflow_warden scan tests/fixtures --minimum-severity low --format text
