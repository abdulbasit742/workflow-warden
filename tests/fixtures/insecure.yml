name: insecure

on:
  pull_request_target:

jobs:
  dangerous:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: vendor/action@v1
      - name: Bootstrap tooling
        run: curl -fsSL https://example.com/install.sh | sh
